# Knowhere document semantic parsing service (standalone self-hosted stack).
#
# Split from eagle-rag main compose for independent maintenance and deployment:
#   cd docker/knowhere-self-hosted
#   docker network create knowhere-net 2>/dev/null || true   # Shared network with eagle-rag
#   docker compose up -d
#
# eagle-rag containers reach API :5005 via shared external network knowhere-net using DNS name ``knowhere``,
# so eagle-rag KNOWHERE_BASE_URL=http://knowhere:5005 needs no change.
# For local direct access (non-container), use KNOWHERE_BASE_URL=http://localhost:5005.
#
# Env var precedence: env.defaults (vendor defaults) < .env (user overrides; do not commit real secrets).
# LLM/parsing keys (DS_KEY / ALI_API_KEYS / MINERU_API_KEYS) go in this directory's .env; see .env.example.

services:
  app:
    image: ${KNOWHERE_IMAGE:-ghcr.io/ontos-ai/knowhere:latest}
    env_file:
      - path: env.defaults
        required: true
      - path: .env
        required: false
    ports:
      - "${DASHBOARD_HOST_BIND:-127.0.0.1}:${DASHBOARD_HOST_PORT:-13000}:3000"
      - "${API_HOST_BIND:-127.0.0.1}:${API_HOST_PORT:-5005}:5005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    volumes:
      - knowhere_user_data:/data/users
      - knowhere_model_cache:/data/models
      - knowhere_secrets:/data/secrets
    healthcheck:
      # Official image is python:3.12-slim with curl installed in Dockerfile; probe /health with curl.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5005/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s   # Matches official Dockerfile HEALTHCHECK; allow warmup time
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      default: {}
      knowhere-net:
        aliases:
          # eagle-rag containers reach this service via DNS name knowhere (http://knowhere:5005).
          - knowhere

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: Knowhere
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_HOST_BIND:-127.0.0.1}:${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d Knowhere"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru --stop-writes-on-bgsave-error no
    ports:
      - "${REDIS_HOST_BIND:-127.0.0.1}:${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  localstack:
    image: localstack/localstack:3.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SERVICES: s3,sns,sqs,iam,sts
      DEBUG: "1"
      PERSISTENCE: "1"
      DATA_DIR: /var/lib/localstack/data
      S3_SKIP_SIGNATURE_VALIDATION: "1"
      S3_SKIP_SSL_VERIFICATION: "1"
      LOCALSTACK_HOST: localstack:4566
      HOSTNAME_EXTERNAL: localstack
      EDGE_PORT: "4566"
      SNS_ENDPOINT_STRATEGY: domain
    ports:
      - "${LOCALSTACK_HOST_BIND:-127.0.0.1}:${LOCALSTACK_HOST_PORT:-4566}:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    networks:
      default:
        aliases:
          # app S3_ENDPOINT_URL=http://localhost.localstack.cloud:4566 resolves to this alias
          - localhost.localstack.cloud
      knowhere-net:
        # Let eagle-rag worker containers resolve localhost.localstack.cloud too;
        # otherwise Knowhere SDK file uploads from worker get Connection refused.
        aliases:
          - localhost.localstack.cloud
          - localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    driver: bridge
  # External network shared with eagle-rag main compose: eagle-rag containers reach API via DNS name knowhere.
  # Create before first deploy: docker network create knowhere-net
  knowhere-net:
    external: true
    name: knowhere-net

volumes:
  knowhere_user_data:
  knowhere_model_cache:
  knowhere_secrets:
  postgres_data:
  redis_data:
  localstack_data:
