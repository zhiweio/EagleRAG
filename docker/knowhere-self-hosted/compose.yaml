# Knowhere 文档语义解析服务（独立自托管栈）。
#
# 本文件从 eagle-rag 主 compose 中拆分，可独立维护与部署：
#   cd docker/knowhere-self-hosted
#   docker network create knowhere-net 2>/dev/null || true   # 与 eagle-rag 共享的网络
#   docker compose up -d
#
# eagle-rag 容器经共享外部网络 knowhere-net 以 DNS 名 ``knowhere`` 访问 API :5005，
# 故 eagle-rag 侧 KNOWHERE_BASE_URL=http://knowhere:5005 无需改动。
# 本机直连（非容器）改为 KNOWHERE_BASE_URL=http://localhost:5005。
#
# 环境变量优先级：env.defaults（vendor 默认） < .env（用户覆盖，勿提交真实密钥）。
# LLM/解析密钥（DS_KEY / ALI_API_KEYS / MINERU_API_KEYS）填入本目录 .env，参见 .env.example。

services:
  app:
    image: ${KNOWHERE_IMAGE:-ghcr.io/ontos-ai/knowhere:latest}
    env_file:
      - path: env.defaults
        required: true
      - path: .env
        required: false
    ports:
      - "${DASHBOARD_HOST_BIND:-127.0.0.1}:${DASHBOARD_HOST_PORT:-13000}:3000"
      - "${API_HOST_BIND:-127.0.0.1}:${API_HOST_PORT:-5005}:5005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    volumes:
      - knowhere_user_data:/data/users
      - knowhere_model_cache:/data/models
      - knowhere_secrets:/data/secrets
    healthcheck:
      # 官方镜像基于 python:3.12-slim 且 Dockerfile 安装了 curl，故用 curl 探测 /health。
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5005/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s   # 与官方 Dockerfile HEALTHCHECK 一致，给足预热
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      default: {}
      knowhere-net:
        aliases:
          # eagle-rag 容器以 DNS 名 knowhere 访问此服务（http://knowhere:5005）。
          - knowhere

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: Knowhere
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_HOST_BIND:-127.0.0.1}:${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d Knowhere"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru --stop-writes-on-bgsave-error no
    ports:
      - "${REDIS_HOST_BIND:-127.0.0.1}:${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  localstack:
    image: localstack/localstack:3.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SERVICES: s3,sns,sqs,iam,sts
      DEBUG: "1"
      PERSISTENCE: "1"
      DATA_DIR: /var/lib/localstack/data
      S3_SKIP_SIGNATURE_VALIDATION: "1"
      S3_SKIP_SSL_VERIFICATION: "1"
      LOCALSTACK_HOST: localstack:4566
      HOSTNAME_EXTERNAL: localstack
      EDGE_PORT: "4566"
      SNS_ENDPOINT_STRATEGY: domain
    ports:
      - "${LOCALSTACK_HOST_BIND:-127.0.0.1}:${LOCALSTACK_HOST_PORT:-4566}:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    networks:
      default:
        aliases:
          # app 的 S3_ENDPOINT_URL=http://localhost.localstack.cloud:4566 解析到此别名
          - localhost.localstack.cloud
      knowhere-net:
        # 让 eagle-rag worker 容器也能解析 localhost.localstack.cloud，
        # 否则 Knowhere SDK 从 worker 上传文件时 Connection refused。
        aliases:
          - localhost.localstack.cloud
          - localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    driver: bridge
  # 与 eagle-rag 主 compose 共享的外部网络：eagle-rag 容器据此以 DNS 名 knowhere 访问 API。
  # 首次部署前需创建：docker network create knowhere-net
  knowhere-net:
    external: true
    name: knowhere-net

volumes:
  knowhere_user_data:
  knowhere_model_cache:
  knowhere_secrets:
  postgres_data:
  redis_data:
  localstack_data:
