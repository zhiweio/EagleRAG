# Eagle-RAG MCP HAProxy load balancer config (HAProxy 3.0 stable).
#
# Architecture: client → haproxy:443 (TLS, h2/http1.1) → mcp:8081 (roundrobin)
#
# Key points:
#   - TLS cert mounted via Swarm secret as /run/secrets/mcp_tls_cert (combined PEM with fullchain + privkey)
#   - server-template dynamically discovers tasks.mcp_mcp replicas (Docker Swarm task DNS), up to 10 replicas
#   - MCP standalone image exposes /health + /metrics via eagle_rag.metrics; httpchk probes
#     GET /health and expects 200
#   - resolvers docker uses Docker built-in DNS 127.0.0.11:53 to resolve replica IPs dynamically
#   - Optionally add http-response set-header Strict-Transport-Security "max-age=31536000" etc.

global
    maxconn 4096
    log stdout format raw local0
    stats socket /run/haproxy.sock mode 660 level admin expose-fd listeners
    tune.ssl.default-dh-param 2048

defaults
    mode http
    log global
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    timeout http-keep-alive 10s
    compression algo gzip
    compression type application/json application/javascript text/plain text/css text/xml
    http-reuse safe
    option forwardfor

# Docker built-in DNS resolver: server-template uses this to resolve tasks.mcp_mcp replica IPs.
resolvers docker
    nameserver dns1 127.0.0.11:53
    resolve_retries 30
    timeout retry 1s
    timeout resolve 1s
    timeout connect 1s
    accepted_payload_size 8192
    hold valid 10s
    hold nx 5s
    hold other 5s

# MCP traffic entry (HTTP redirects to HTTPS; HTTPS forwards to mcp_back).
frontend mcp_in
    bind *:80
    bind *:443 ssl crt /run/secrets/mcp_tls_cert alpn h2,http/1.1
    redirect scheme https code 301 if !{ ssl_fc }
    acl is_mcp path_beg /mcp
    acl is_metrics path_beg /metrics
    acl is_health path_beg /health
    # mcp_app mounted at / root; all paths forward to MCP backend.
    default_backend mcp_back

# MCP backend: roundrobin load balancing + health check + dynamic replica discovery.
backend mcp_back
    balance roundrobin
    # MCP standalone image exposes /health via eagle_rag.metrics; 200 = service alive.
    option httpchk GET /health
    http-check expect status 200
    default-server inter 5s rise 2 fall 3 resolvers docker init-addr none check
    server-template mcp 10 tasks.mcp_mcp:8081
    http-response set-header X-Content-Type-Options nosniff

# HAProxy stats page (port 8404; restrict source IP or add Basic Auth in production).
frontend stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 10s
    stats show-legends
    stats admin if TRUE
