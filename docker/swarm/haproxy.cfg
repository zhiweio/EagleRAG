# Eagle-RAG MCP HAProxy 负载均衡配置（HAProxy 3.0 稳定版）。
#
# 架构：client → haproxy:443 (TLS, h2/http1.1) → mcp:8081 (roundrobin)
#
# 关键点：
#   - TLS 证书经 Swarm secret 挂载为 /run/secrets/mcp_tls_cert（含 fullchain + privkey 的合并 PEM）
#   - server-template 动态发现 tasks.mcp_mcp 副本（Docker Swarm 任务 DNS），最多 10 副本
#   - MCP 独立镜像经 eagle_rag.metrics 暴露 /health + /metrics 端点，httpchk 探测
#     GET /health 并期望 200
#   - resolvers docker 使用 Docker 内置 DNS 127.0.0.11:53 动态解析副本 IP
#   - 可按需追加 http-response set-header Strict-Transport-Security "max-age=31536000" 等

global
    maxconn 4096
    log stdout format raw local0
    stats socket /run/haproxy.sock mode 660 level admin expose-fd listeners
    tune.ssl.default-dh-param 2048

defaults
    mode http
    log global
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    timeout http-keep-alive 10s
    compression algo gzip
    compression type application/json application/javascript text/plain text/css text/xml
    http-reuse safe
    option forwardfor

# Docker 内置 DNS 解析器：server-template 据此动态解析 tasks.mcp_mcp 副本 IP。
resolvers docker
    nameserver dns1 127.0.0.11:53
    resolve_retries 30
    timeout retry 1s
    timeout resolve 1s
    timeout connect 1s
    accepted_payload_size 8192
    hold valid 10s
    hold nx 5s
    hold other 5s

# MCP 流量入口（HTTP 重定向到 HTTPS，HTTPS 转发到 mcp_back）。
frontend mcp_in
    bind *:80
    bind *:443 ssl crt /run/secrets/mcp_tls_cert alpn h2,http/1.1
    redirect scheme https code 301 if !{ ssl_fc }
    acl is_mcp path_beg /mcp
    acl is_metrics path_beg /metrics
    acl is_health path_beg /health
    # mcp_app 挂在 / 根路径，所有路径转 MCP 后端。
    default_backend mcp_back

# MCP 后端：roundrobin 负载均衡 + 健康检查 + 动态副本发现。
backend mcp_back
    balance roundrobin
    # MCP 独立镜像经 eagle_rag.metrics 暴露 /health 端点，返回 200 表示服务存活。
    option httpchk GET /health
    http-check expect status 200
    default-server inter 5s rise 2 fall 3 resolvers docker init-addr none check
    server-template mcp 10 tasks.mcp_mcp:8081
    http-response set-header X-Content-Type-Options nosniff

# HAProxy 统计页面（端口 8404，生产应限制来源 IP 或加 Basic Auth）。
frontend stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 10s
    stats show-legends
    stats admin if TRUE
