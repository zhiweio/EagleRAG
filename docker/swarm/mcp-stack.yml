# Eagle-RAG MCP service Docker Swarm HA deployment stack.
#
# Usage:
#   docker stack deploy -c docker/swarm/mcp-stack.yml mcp
#
# Prerequisites:
#   1. Initialize Swarm (if not already): docker swarm init
#   2. Create infrastructure overlay network (for MCP to reach postgres/redis/milvus/minio):
#      docker network create --driver overlay --attachable eagle-infra
#      (Infrastructure services must join this network, or deploy in the same Swarm stack)
#   3. Create Swarm secrets:
#      printf "<api-key>" | docker secret create mcp_api_key -
#      docker secret create mcp_tls_cert ./fullchain.pem   # Combined PEM with cert + private key
#   4. Infrastructure ready (postgres/redis/milvus/minio/knowhere), joined to eagle-infra network
#   5. Image ready: docker build -f docker/Dockerfile.mcp -t eagle-rag-mcp .
#      (Production: ghcr.io private image; Swarm manager needs docker login ghcr.io)
#
# Multi-environment: override via env vars (.env or shell export), e.g. MCP_REPLICAS, MCP_WORKERS,
#   MCP_IMAGE, POSTGRES_DSN, CELERY_BROKER_URL, etc.
#
# Architecture:
#   - mcp: MCP HTTP service (stateless + JSON-only), horizontally scaled N replicas
#   - haproxy: HAProxy 3.0 load balancer, dynamic discovery of tasks.mcp_mcp replicas via server-template
#   - Traffic: client → haproxy:443 (TLS) → mcp:8081 (roundrobin)
#
# Note: MCP standalone image exposes /health + /metrics via eagle_rag.metrics;
#   healthcheck and haproxy httpchk both probe /health (200 = alive).

version: "3.8"

services:
  # ======================== MCP HTTP Service ========================
  mcp:
    image: ${MCP_IMAGE:-eagle-rag-mcp:latest}
    environment:
      # fastmcp stateless mode (any replica can handle any request, no sticky routing).
      FASTMCP_STATELESS_HTTP: "true"
      MCP_TRANSPORT: "http"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8081"
      MCP_WORKERS: ${MCP_WORKERS:-4}
      MCP_AUTH_PROVIDER: ${MCP_AUTH_PROVIDER:-static-token}
      # Auth: settings.yaml injects auth.api_key via ${AUTH_API_KEY} placeholder expansion.
      # AuthSettings does not support _FILE suffix (inherits pydantic.BaseModel, not BaseSettings),
      # so use env vars directly; secrets mount reserved for future app-layer _FILE support.
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      AUTH_API_KEY: ${AUTH_API_KEY:-}
      AUTH_API_KEY_FILE: /run/secrets/mcp_api_key
      # Infrastructure connections (settings.yaml expands ${VAR} placeholders).
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://eagle:eagle@postgres:5432/eagle_rag}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      MCP_REDIS_URL: ${MCP_REDIS_URL:-redis://redis:6379/0}
      MILVUS_HOST: ${MILVUS_HOST:-milvus}
      MILVUS_PORT: ${MILVUS_PORT:-19530}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-eagle-rag}
      KNOWHERE_BASE_URL: ${KNOWHERE_BASE_URL:-http://knowhere:5005}
      KNOWHERE_API_KEY: ${KNOWHERE_API_KEY:-}
      # LLM / VLM / Embedding credentials.
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      VLM_API_KEY: ${VLM_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      # Application environment.
      KB_NAME: ${KB_NAME:-default}
      APP_ENV: ${APP_ENV:-prod}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # PluginAudit multi-sink (AI JSONL + Redis recent window shared across MCP replicas).
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-true}
      AI_TELEMETRY_LOG_FILE: ${AI_TELEMETRY_LOG_FILE:-logs/ai_telemetry.jsonl}
      PLUGIN_AUDIT_ENABLED: ${PLUGIN_AUDIT_ENABLED:-true}
      PLUGIN_AUDIT_REDIS_ENABLED: ${PLUGIN_AUDIT_REDIS_ENABLED:-true}
    healthcheck:
      # MCP standalone image exposes /health via eagle_rag.metrics; 200 = alive.
      test:
        - CMD-SHELL
        - "curl -sf http://localhost:8081/health || exit 1"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      replicas: ${MCP_REPLICAS:-3}
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          cpus: "0.5"
          memory: 512m
      # Node label scheduling (optional): docker node update --label-add eagle_role=mcp <node>
      # Remove constraints if no labeled nodes; Swarm will schedule freely.
      placement:
        constraints:
          - node.labels.eagle_role == mcp
    networks:
      - eagle-net
      - eagle-infra
    secrets:
      - mcp_api_key

  # ======================== HAProxy Load Balancer ========================
  haproxy:
    image: haproxy:3.0
    ports:
      - "443:443"
      - "80:80"
      - "8404:8404"  # stats page
    configs:
      - source: haproxy_cfg
        target: /usr/local/etc/haproxy/haproxy.cfg
    secrets:
      - mcp_tls_cert
    deploy:
      # Single replica for simplicity; production can run 2 replicas + keepalived/VRRP for HA entry.
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
      update_config:
        order: start-first
        failure_action: rollback
    healthcheck:
      # Validate HAProxy config syntax (does not forward traffic).
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - eagle-net

networks:
  # Overlay network between MCP and HAProxy (encrypted: true enables IPsec for cross-node traffic).
  eagle-net:
    driver: overlay
    encrypted: true
  # External infrastructure network: MCP connects to postgres/redis/milvus/minio.
  # Create first: docker network create --driver overlay --attachable eagle-infra
  # If infrastructure is in the same Swarm, join the same stack or this external network.
  eagle-infra:
    external: true

secrets:
  # MCP auth API key: printf "<api-key>" | docker secret create mcp_api_key -
  mcp_api_key:
    external: true
  # TLS certificate (combined PEM with fullchain + privkey):
  # docker secret create mcp_tls_cert ./fullchain.pem
  # Production: Let's Encrypt + periodic rotation recommended.
  mcp_tls_cert:
    external: true

configs:
  haproxy_cfg:
    file: ./haproxy.cfg
