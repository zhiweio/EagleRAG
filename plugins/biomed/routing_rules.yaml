  BRCA2:
    aliases: ["BRCA-2", "breast cancer 2"]
    cui: "C0376517"
    pathways: ["HRR", "DNA repair"]
    related_drugs: ["olaparib", "rucaparib"]
  TP53:
    aliases: ["p53", "P53", "tumor protein p53"]
    cui: "C0080056"
    pathways: ["apoptosis", "cell cycle"]
    related_drugs: []
  KRAS:
    aliases: ["Kirsten rat sarcoma", "K-Ras"]
    cui: "C0022730"
    pathways: ["MAPK", "RAF-MEK-ERK"]
    related_drugs: ["sotorasib", "adagrasib"]
  ALK:
    aliases: ["anaplastic lymphoma kinase", "CD246"]
    cui: "C1332106"
