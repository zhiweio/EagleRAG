    related_drugs: ["bevacizumab", "ramucirumab"]
  imatinib:
    aliases: ["Gleevec", "STI-571", "CGP57148"]
    cui: "C0935989"
    pathways: ["BCR-ABL"]
    related_drugs: ["dasatinib", "nilotinib"]
  metformin:
    aliases: ["Glucophage", "dimethylbiguanide"]
    cui: "C0025595"
    pathways: ["AMPK"]
    related_drugs: []
  aspirin:
    aliases: ["acetylsalicylic acid", "ASA"]
    cui: "C0004057"
    pathways: ["COX"]
    related_drugs: []

entity_keywords:
  - kinase
  - pathway
  - receptor
  - mutation
  - oncogene
  - tumor suppressor
  - apoptosis
  - phosphorylation
  - immunotherapy
  - biomarker
  - monoclonal antibody
  - pharmacokinetics

chemical:
  smiles_patterns:
    - pattern: "\\[[A-Z][a-z]?@?\\]"
      description: "bracketed atom tokens"
    - pattern: "C\\(=O\\)"
      description: "carbonyl"
    - pattern: "InChI="
      description: "InChI prefix"
  keywords:
    - SMILES
    - InChI
    - molfile
    - compound
    - ligand
    - inhibitor
  name_aliases:
    ethanol: "CCO"
    aspirin: "CC(=O)Oc1ccccc1C(=O)O"
    caffeine: "CN1C=NC2=C1C(=O)N(C(=O)N2C)C"
    imatinib: "Cc1ccc(NC(=O)c2ccc(CN3CCN(C)CC3)cc2)cc1Nc1nccc(-c2cccnc2)n1"

radiology:
  keywords:
    - CT scan
    - computed tomography
    - MRI
    - magnetic resonance
    - ultrasound
    - radiograph
    - chest x-ray
    - lesion
    - nodule
    - contrast enhancement
    - DICOM

pathology:
  keywords:
    - H&E
    - hematoxylin
    - histopathology
    - biopsy
    - dysplasia
    - carcinoma in situ
    - mitosis
    - stroma
    - immunohistochemistry
    - FFPE
