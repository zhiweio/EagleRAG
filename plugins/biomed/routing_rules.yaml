chemical:
  smiles_patterns:
    - pattern: "\\[[A-Z][a-z]?@?\\]"
      description: "bracketed atom tokens"
    - pattern: "C\\(=O\\)"
      description: "carbonyl"
    - pattern: "InChI="
      description: "InChI prefix"
  keywords:
    - SMILES
    - InChI
    - molfile
    - compound
    - ligand
    - inhibitor
  name_aliases:
    ethanol: "CCO"
    aspirin: "CC(=O)Oc1ccccc1C(=O)O"
    caffeine: "CN1C=NC2=C1C(=O)N(C(=O)N2C)C"
    imatinib: "Cc1ccc(NC(=O)c2ccc(CN3CCN(C)CC3)cc2)cc1Nc1nccc(-c2cccnc2)n1"
    fruquintinib: "CCc1nc2c(C)cc(-c3nc(N)nc(N4CCOCC4)n3)cc2n1CC"
    savolitinib: "COc1cc2nccc(Oc3ccc(NC(=O)C4(C(=O)Nc5ccc(F)cc5)CC4)cc3F)c2cc1OC"
    surufatinib: "COc1cc2nccc(Oc3ccc(NC(=O)Nc4cc(C(F)(F)F)ccc4Cl)c(F)c3)c2cc1OCCCN1CCOCC1"
    sunitinib: "CCN(CC)CCNC(=O)c1c(C)[nH]c(C=C2C(=O)Nc3ccc(F)cc32)c1C"
    osimertinib: "COc1cc(N(C)CCN(C)C)c(Nc2nccc(-c3cn(C)c4ccccc34)n2)cc1NC(=O)C=C"
    gefitinib: "COc1cc2ncnc(Nc3ccc(F)c(Cl)c3)c2cc1OCCCN1CCOCC1"
    lapatinib: "CS(=O)(=O)CCNCc1ccc(-c2ccc3ncnc(Nc4ccc(OCc5cccc(F)c5)c(Cl)c4)c3c2)o1"

