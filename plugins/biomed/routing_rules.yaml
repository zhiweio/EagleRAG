# Biomed query routing rules (G15). Loaded by BiomedQueryRouteClassifier + UMLS index.
umls_entities:
  HER2:
    aliases: ["ERBB2", "HER-2", "CD340", "neu"]
    cui: "C1706866"
    pathways: ["PI3K-AKT", "MAPK", "ERBB"]
    related_drugs: ["trastuzumab", "pertuzumab", "lapatinib"]
  EGFR:
    aliases: ["ERBB1", "Epidermal growth factor receptor", "HER1"]
