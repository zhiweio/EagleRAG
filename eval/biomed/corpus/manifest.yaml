# HUTCHMED Oncology Innovative Drugs KB — corpus download quotas (~300 ingest docs).
# download_corpus.py reads this file; adjust quotas only with matching eval gold sets.

theme: hutchmed_oncology_innovative_drugs
kb_name: hutchmed
total_target: 300

quotas:
  papers: 120          # A — PMC OA / Europe PMC full text
  abstracts: 80        # B — PubMed-style abstracts (Europe PMC + optional HF)
  trials: 40           # C — ClinicalTrials.gov
  compounds: 30        # D — PubChem compound cards
  labels: 20           # E — openFDA / DailyMed-style labels
  guidance: 15         # F — FDA / ICH public guidance
  company: 15          # G — HUTCHMED public pages

# Europe PMC query layers. download_corpus.py always AND-s OPEN_ACCESS:y AND HAS_PDF:y
# and rejects abstract-only stubs (PDF >=40KB or fullTextXML >=6k chars).
paper_queries:
  - '(fruquintinib OR "HMPL-013" OR ELUNATE OR FRUZAQLA) AND (REVIEW OR "clinical trial" OR "phase")'
  - '(savolitinib OR "HMPL-504" OR ORPATHYS OR volitinib OR AZD6094) AND (REVIEW OR "clinical trial" OR NSCLC)'
  - '(surufatinib OR sulfatinib OR "HMPL-012" OR SULANDA) AND (REVIEW OR "clinical trial" OR neuroendocrine)'
  - 'VEGFR inhibitor AND (colorectal OR mCRC) AND (REVIEW OR "randomized" OR "phase III")'
  - '("MET amplification" OR "MET exon 14") AND NSCLC AND (REVIEW OR "clinical trial")'
  - '("neuroendocrine tumor" OR pNET) AND (sunitinib OR surufatinib OR everolimus) AND REVIEW'
  - '(PDAC OR "pancreatic ductal adenocarcinoma") AND (immunotherapy OR camrelizumab) AND ("clinical trial" OR REVIEW)'
  - '(sintilimab OR camrelizumab) AND (fruquintinib OR surufatinib OR "tyrosine kinase") AND ("clinical trial" OR REVIEW)'
  - '(osimertinib AND MET) AND (savolitinib OR capmatinib OR tepotinib) AND ("clinical trial" OR REVIEW)'
  - '(cabozantinib OR lenvatinib OR regorafenib) AND (RCC OR mCRC) AND (REVIEW OR "phase III")'

abstract_queries:
  - 'fruquintinib OR savolitinib OR surufatinib'
  - 'VEGFR inhibitor colorectal cancer'
  - 'MET amplification osimertinib resistance'
  - 'neuroendocrine tumor tyrosine kinase inhibitor'
  - 'PD-1 inhibitor combination anti-angiogenic'

trial_queries:
  - fruquintinib
  - savolitinib
  - surufatinib
  - "fruquintinib sintilimab"
  - "savolitinib osimertinib"
  - "surufatinib camrelizumab"
  - "HMPL-013"
  - "HMPL-504"
  - "HMPL-012"

