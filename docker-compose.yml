# Eagle-RAG base Compose file (shared by dev / test / prod).
#
# Prerequisites:
#   1. cp .env.example .env and fill VLM/LLM/Embedding API keys and DB credentials.
#   2. Knowhere is a separate Compose stack (docker/knowhere-self-hosted/compose.yaml).
#      Start it first: cd docker/knowhere-self-hosted && docker compose up -d
#      Create the shared network: docker network create knowhere-net
#
# Usage:
#   dev  : docker compose --profile dev up -d
#          (auto-merges docker-compose.override.yml: source hot-reload + exposed infra ports)
#   prod : COMPOSE_FILE=docker-compose.yml docker compose --profile prod up -d
#          (COMPOSE_FILE locks the file list and excludes the dev override)
#   docs : docker compose --profile docs up -d docs
#
# Infra services (etcd/minio/milvus/postgres/redis) have no profile and start with any profile.
# App services (api/worker-*/frontend) use [dev,test,prod]; docs uses [docs,prod].
# Knowhere document parsing is not defined here; see docker/knowhere-self-hosted/compose.yaml.
#
# Notes: eagle_rag/settings.yaml uses ${VAR:-default} placeholders (milvus.host,
#   celery.broker_url, minio.endpoint, postgres.dsn, knowhere.base_url, kb_name, …),
#   so Compose environment and .env vars reach the app. Placeholder defaults are still
#   localhost — containers must inject service DNS names (e.g. KNOWHERE_BASE_URL=
#   http://knowhere:5005, MILVUS_HOST=milvus) or connectivity fails. VLM/LLM/Embedding
#   api_key/base_url can be supplied via .env alone.
#
# PluginAudit (multi-sink): api/workers get PLUGIN_AUDIT_* / CELERY_BROKER_URL /
#   TELEMETRY_* via x-app-telemetry-env. Redis LIST recent window needs the redis
#   service. AI JSONL is written under ./logs (mounted at /app/logs). Probe:
#   GET /health/plugins → recent_decisions.

name: eagle-rag

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-worker-build: &worker-build
  context: .
  dockerfile: docker/Dockerfile.worker
  args:
    GITHUB_PROXY: ${GITHUB_PROXY:-}
    HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
    MODEL_REPO_ID: ${MODEL_REPO_ID:-Qwen/Qwen3-VL-Embedding-2B}
    MODEL_DOWNLOAD_SOURCE: ${MODEL_DOWNLOAD_SOURCE:-modelscope}
    HF_HUB_DOWNLOAD_MAX_WORKERS: ${HF_HUB_DOWNLOAD_MAX_WORKERS:-8}

# Shared app env for API + workers: PluginAudit multi-sink (AI JSONL + Redis recent window)
# needs broker Redis reachable and the knobs below. See eagle_rag/plugins/audit.py.
x-app-telemetry-env: &app-telemetry-env
  TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-true}
  AI_TELEMETRY_LOG_FILE: ${AI_TELEMETRY_LOG_FILE:-logs/ai_telemetry.jsonl}
  OP_LOG_FILE: ${OP_LOG_FILE:-logs/eagle_rag.log}
  REDIS_LOG_CHANNEL: ${REDIS_LOG_CHANNEL:-logs}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  PLUGIN_AUDIT_ENABLED: ${PLUGIN_AUDIT_ENABLED:-true}
  PLUGIN_AUDIT_REDIS_ENABLED: ${PLUGIN_AUDIT_REDIS_ENABLED:-true}

networks:
  eagle-net:
    driver: bridge
  # External network shared with docker/knowhere-self-hosted/compose.yaml.
  # eagle-rag containers reach Knowhere API :5005 via DNS name ``knowhere``.
  # Create once before first deploy: docker network create knowhere-net
  knowhere-net:
    external: true
    name: knowhere-net

volumes:
  vol-etcd:
  vol-milvus:
  vol-minio:
  vol-redis:
  vol-postgres:

services:
  # ======================== Infrastructure ========================
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - vol-etcd:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    logging: *default-logging
    networks: [eagle-net]

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - vol-minio:/data
    healthcheck:
      # MinIO image ships /usr/bin/curl (wget is missing on this RELEASE.2023-03-20 base).
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging
    networks: [eagle-net]

  milvus:
    image: milvusdb/milvus:v2.6.19
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - vol-milvus:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 60s
    logging: *default-logging
    networks: [eagle-net]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eagle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eagle}
      POSTGRES_DB: ${POSTGRES_DB:-eagle_rag}
    volumes:
      - vol-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eagle} -d ${POSTGRES_DB:-eagle_rag}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks: [eagle-net]

  redis:
    image: redis:7-alpine
    volumes:
      - vol-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks: [eagle-net]

  # ======================== Knowhere (separate Compose stack) ========================
  # Knowhere lives in docker/knowhere-self-hosted/compose.yaml (independently maintained).
  # eagle-rag reaches API :5005 on shared network knowhere-net via DNS name ``knowhere``.
  # Start order: Knowhere first, then eagle-rag. eagle-rag is fail-closed: parse jobs
  # become FAILED when Knowhere is down (no silent fallback).

  # ======================== Backend API ========================
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      args:
        GITHUB_PROXY: ${GITHUB_PROXY:-}
    image: eagle-rag-api:latest
    env_file: .env
    environment:
      <<: *app-telemetry-env
      APP_ENV: ${APP_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Knowhere: mode=api uses self-hosted :5005 (knowhere-net); mode=parser uses in-process SDK.
      KNOWHERE_MODE: ${KNOWHERE_MODE:-api}
      KNOWHERE_BASE_URL: ${KNOWHERE_BASE_URL:-http://knowhere:5005}
      KNOWHERE_API_KEY: ${KNOWHERE_API_KEY:-}
      MINERU_API_KEYS: ${MINERU_API_KEYS:-}
      MINERU_URL: ${MINERU_URL:-https://mineru.net/api/v4}
      KB_NAME: ${KB_NAME:-default}
      # HuggingFace mirror + cache (shared with worker-pixelrag via ./data volume)
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      HF_HOME: /app/data/huggingface
      HF_HUB_DOWNLOAD_TIMEOUT: ${HF_HUB_DOWNLOAD_TIMEOUT:-120}
    volumes:
      # settings.yaml storage.data_dir=./data → /app/data inside the container (WORKDIR /app).
      - ./data:/app/data
      # PluginAudit AI JSONL + ops log (settings.yaml telemetry.ai_log_file / op_log_file).
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
      # Knowhere is not in this Compose file (split to docker/knowhere-self-hosted/),
      # so cross-compose depends_on is unavailable; fail-closed marks parse FAILED if down.
    healthcheck:
      # /health = deps; PluginAudit recent window is under /health/plugins (not a liveness gate).
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging: *default-logging
    networks: [eagle-net, knowhere-net]
    profiles: [dev, test, prod]

  # ======================== Celery workers (shared image, per-queue params) ========================
  worker-router:
    build: *worker-build
    image: eagle-rag-worker:latest
    env_file: .env
    environment:
      <<: *app-telemetry-env
      QUEUES: router_queue
      CONCURRENCY: "4"
      APP_ENV: ${APP_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      KNOWHERE_MODE: ${KNOWHERE_MODE:-api}
      KNOWHERE_BASE_URL: ${KNOWHERE_BASE_URL:-http://knowhere:5005}
      KNOWHERE_API_KEY: ${KNOWHERE_API_KEY:-}
      MINERU_API_KEYS: ${MINERU_API_KEYS:-}
      MINERU_URL: ${MINERU_URL:-https://mineru.net/api/v4}
      KB_NAME: ${KB_NAME:-default}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    # Healthcheck: celery inspect ping scoped to this worker (-d celery@$(hostname)).
    # start_period 60s allows LlamaIndex/Milvus client warm-up.
    healthcheck:
      test: ["CMD-SHELL", "celery -A eagle_rag.tasks.celery_app inspect ping -d celery@$(hostname) -t 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    networks: [eagle-net]
    profiles: [dev, test, prod]

  worker-knowhere:
    build: *worker-build
    image: eagle-rag-worker:latest
    env_file: .env
    environment:
      <<: *app-telemetry-env
      QUEUES: knowhere_queue
      CONCURRENCY: "8"
      APP_ENV: ${APP_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      KNOWHERE_MODE: ${KNOWHERE_MODE:-api}
      KNOWHERE_BASE_URL: ${KNOWHERE_BASE_URL:-http://knowhere:5005}
      KNOWHERE_API_KEY: ${KNOWHERE_API_KEY:-}
      MINERU_API_KEYS: ${MINERU_API_KEYS:-}
      MINERU_URL: ${MINERU_URL:-https://mineru.net/api/v4}
      KB_NAME: ${KB_NAME:-default}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      # Knowhere is not in this Compose file (mode=api needs knowhere-net :5005;
      # mode=parser does not require the external Knowhere service).
    deploy:
      resources:
        limits:
          cpus: "2.0"
    # Healthcheck: celery inspect ping scoped to this worker (-d celery@$(hostname)).
    healthcheck:
      test: ["CMD-SHELL", "celery -A eagle_rag.tasks.celery_app inspect ping -d celery@$(hostname) -t 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    networks: [eagle-net, knowhere-net]
    profiles: [dev, test, prod]

  worker-pixelrag:
    build: *worker-build
    image: eagle-rag-worker:latest
    env_file: .env
    environment:
      <<: *app-telemetry-env
      QUEUES: pixelrag_queue
      CONCURRENCY: "1"
      APP_ENV: ${APP_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      KNOWHERE_BASE_URL: ${KNOWHERE_BASE_URL:-http://knowhere:5005}
      KNOWHERE_API_KEY: ${KNOWHERE_API_KEY:-}
      KB_NAME: ${KB_NAME:-default}
      # Baked visual encoder weights at /opt/huggingface/model (no Hub download at runtime).
      VISUAL_EMBEDDING_MODEL: /opt/huggingface/model
      CHROME_PATH: /usr/local/bin/chrome
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    # PixelRAG rendering is memory-heavy: hard memory limit to avoid OOM affecting peers.
    # PixelRAG is an in-process library (pixelrag_render / pixelrag_embed); no pixelrag-serve.
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"
    # Healthcheck: celery inspect ping scoped to this worker (-d celery@$(hostname)).
    healthcheck:
      test: ["CMD-SHELL", "celery -A eagle_rag.tasks.celery_app inspect ping -d celery@$(hostname) -t 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    networks: [eagle-net]
    profiles: [dev, test, prod]

  # ======================== Frontend ========================
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    image: eagle-rag-frontend:latest
    environment:
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    # Healthcheck: node:20-slim has no wget/curl; use Node's http module on :3000.
    # Dev override oven/bun image supports the same via bun's node wrapper.
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging: *default-logging
    networks: [eagle-net]
    profiles: [dev, test, prod]

  # ======================== Docs site ========================
  docs:
    build:
      context: .
      dockerfile: docker/Dockerfile.docs
    image: eagle-rag-docs:latest
    ports:
      - "8001:8001"
    # Healthcheck: nginx:alpine includes wget; probe :8001.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging
    networks: [eagle-net]
    profiles: [docs, prod]
