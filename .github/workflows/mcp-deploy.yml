# Eagle-RAG MCP 服务 CI/CD 流程。
#
# 流程：push main → 构建镜像 → Trivy 安全扫描 → push ghcr.io → SSH 到 Swarm manager
#   → docker service update 滚动更新（start-first 零中断）。
#
# 前置：
#   1. Swarm manager 已 docker swarm init
#   2. Swarm manager 已 docker login ghcr.io（拉私有镜像）
#   3. repo Settings → Secrets and variables → Actions 配置：
#      - SWARM_MANAGER_HOST：Swarm manager 主机/IP
#      - SWARM_MANAGER_USER：SSH 用户
#      - SWARM_MANAGER_SSH_KEY：SSH 私钥
#   4. Swarm secrets 与基础设施已就绪（见 docker/swarm/mcp-stack.yml 顶部注释）

name: MCP Deploy

on:
  push:
    branches: [main]
    paths:
      - docker/Dockerfile.mcp
      - eagle_rag/api/mcp_server*.py
      - eagle_rag/api/mcp_http.py
      - eagle_rag/config.py
      - eagle_rag/settings.yaml
      - pyproject.toml
      - docker/swarm/**
      - .github/workflows/mcp-deploy.yml
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/eagle-rag-mcp

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push MCP image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.mcp
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "0"  # 仅告警不阻断；生产可改 1 阻断
          ignore-unfixed: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Docker Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SWARM_MANAGER_HOST }}
          username: ${{ secrets.SWARM_MANAGER_USER }}
          key: ${{ secrets.SWARM_MANAGER_SSH_KEY }}
          script: |
            # 滚动更新 MCP 服务（start-first 零中断，见 mcp-stack.yml update_config）
            # 服务名 mcp_mcp = <stack名>_<service名>（stack=mcp, service=mcp）
            docker service update --image ghcr.io/${{ github.repository_owner }}/eagle-rag-mcp:${{ github.sha }} mcp_mcp
            # 替代方案：重新部署整栈（含 haproxy 配置变更时需用此命令）
            # docker stack deploy -c docker/swarm/mcp-stack.yml mcp
