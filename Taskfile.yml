# Eagle-RAG unified task runner (taskfile.dev, version 3).
# Usage:
#   task               # list all tasks
#   task setup         # bootstrap (.env, install deps)
#   task up            # start full Docker stack (dev profile)
#   task dev           # run frontend + backend locally with hot reload
#   task be:worker QUEUES=router_queue,knowhere_queue,pixelrag_queue CONCURRENCY=4
#
# Architecture notes:
#   - PixelRAG is an in-process library (pixelrag_render / pixelrag_embed); no serve mode or FAISS.
#     Visual vectors are written to Milvus eagle_visual.
#   - Knowhere parsing: KNOWHERE_MODE=api (default) starts docker/knowhere-self-hosted/ (HTTP :5005);
#     KNOWHERE_MODE=parser uses knowhere-parse-sdk in-process; task up skips the self-hosted stack.
#     In api mode, eagle-rag reaches Knowhere via knowhere-net DNS name knowhere; on host use localhost:5005.
#   - Ingest routing: PDF form probe (pypdf/pdfplumber) routes text PDFs to Knowhere, scanned to PixelRAG;
#     Excel goes through Knowhere (LibreOffice removed).
#   - Models: DeepSeek (text LLM/routing) + Qwen (VLM / text embed dim1536 / visual embed dim2048 / rerank);
#     single Milvus cluster with eagle_text + eagle_visual collections.

version: '3'

# Load .env when present (created by task setup).
dotenv: ['.env']

vars:
  FRONTEND_DIR: ./frontend
  API_HOST: 0.0.0.0
  API_PORT: '8000'
  DOCS_PORT: '8001'
  # Knowhere self-hosted stack (separate compose project; env_file resolved in this directory).
  KNOWHERE_DIR: ./docker/knowhere-self-hosted
  # KNOWHERE_MODE: api (self-hosted :5005) | parser (in-process SDK, no self-hosted stack).
  KNOWHERE_MODE: '{{.KNOWHERE_MODE | default "api"}}'
  # KNOWHERE_BASE_URL from .env, fallback localhost:5005 (api mode only).
  KNOWHERE_BASE_URL: '{{.KNOWHERE_BASE_URL | default "http://localhost:5005"}}'

# ======================== Frontend ========================
tasks:
  fe:dev:
    desc: Start frontend dev server (hot reload)
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - bun run dev

  fe:build:
    desc: Build frontend for production
    dir: '{{.FRONTEND_DIR}}'
    sources:
      - app/**
      - components/**
      - package.json
    generates:
      - .next
    cmds:
      - bun run build

  fe:lint:
    desc: Lint frontend with Biome
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - bun run lint

  fe:format:
    desc: Format frontend with Biome
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - bun run format

  fe:start:
    desc: Start frontend production server
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - bun run start

  fe:deps:
    desc: Sync node_modules inside Docker frontend container (when anonymous volume drifts from bun.lock)
    cmds:
      - docker compose --profile dev exec -T frontend bun install
      - docker compose --profile dev restart frontend

  # ======================== Backend ========================
  be:api:
    desc: Start backend API (hot reload)
    cmds:
      - uv run uvicorn eagle_rag.api.app:app --reload --host {{.API_HOST}} --port {{.API_PORT}}

  be:worker:
    desc: Start Celery worker (parametrize queues; default all three queues)
    cmds:
      - uv run celery -A eagle_rag.tasks.celery_app worker -Q {{.QUEUES | default "router_queue,knowhere_queue,pixelrag_queue"}} -c {{.CONCURRENCY | default 4}} --loglevel=info

  be:test:
    desc: Run backend tests
    cmds:
      - uv run pytest

  be:lint:
    desc: Lint backend with Ruff
    cmds:
      - uv run ruff check

  be:format:
    desc: Format backend with Ruff
    cmds:
      - uv run ruff format

  be:typecheck:
    desc: Type-check backend with Mypy
    cmds:
      - uv run mypy eagle_rag

  # ======================== Docker ========================
  # Ensure shared external network knowhere-net exists (used by eagle-rag and knowhere-self-hosted).
  # Main compose declares it external: true; missing network breaks `task up`.
  # internal: true — hidden from task --list, used as a dependency only.
  net:ensure:
    internal: true
    cmds:
      - docker network create knowhere-net 2>/dev/null || true

  up:
    desc: Start all services (api mode includes knowhere self-hosted; parser mode skips it; dev + frontend HMR)
    deps: [knowhere:up]
    preconditions:
      - sh: test -f .env
        msg: "Missing .env — run task setup or cp .env.example .env"
    cmds:
      - docker compose --profile dev up -d
      - |
        if [ "{{.KNOWHERE_MODE}}" = "parser" ]; then
          echo "All services up (KNOWHERE_MODE=parser, self-hosted knowhere skipped): api :8000 / frontend :3000"
        else
          echo "All services up: knowhere API :5005 / api :8000 / frontend :3000"
        fi

  up:prod:
    desc: Start production stack (api mode includes knowhere self-hosted; parser mode skips it)
    deps: [knowhere:up]
    preconditions:
      - sh: test -f .env
        msg: "Missing .env — run task setup or cp .env.example .env"
    cmds:
      - COMPOSE_FILE=docker-compose.yml docker compose --profile prod up -d

  down:
    desc: Stop all services (eagle-rag; also stops knowhere self-hosted in api mode)
    cmds:
      - docker compose --profile dev down
      - |
        if [ "{{.KNOWHERE_MODE}}" != "parser" ]; then
          cd {{.KNOWHERE_DIR}} && unset POSTGRES_PASSWORD APP_ENV && docker compose down
        else
          echo "KNOWHERE_MODE=parser: skipping knowhere self-hosted stack down"
        fi

  build:
    desc: Build all images
    cmds:
      # api/worker-*/frontend use profiles [dev,test,prod]; --profile required for build.
      - docker compose --profile dev build

  build:prod:
    desc: Build production images
    cmds:
      - docker compose --profile prod build

  logs:
    desc: Tail logs for all services
    cmds:
      - docker compose logs -f

  ps:
    desc: Show service status (eagle-rag; includes knowhere self-hosted in api mode)
    cmds:
      - docker compose ps
      - |
        if [ "{{.KNOWHERE_MODE}}" != "parser" ]; then
          cd {{.KNOWHERE_DIR}} && unset POSTGRES_PASSWORD APP_ENV && docker compose ps
        fi

  clean:
    desc: Stop and remove volumes (destructive; includes knowhere self-hosted in api mode)
    cmds:
      - docker compose --profile dev down -v
      - |
        if [ "{{.KNOWHERE_MODE}}" != "parser" ]; then
          cd {{.KNOWHERE_DIR}} && unset POSTGRES_PASSWORD APP_ENV && docker compose down -v
        else
          echo "KNOWHERE_MODE=parser: skipping knowhere self-hosted stack clean"
        fi

  # ======================== Docs ========================
  docs:serve:
    desc: Preview docs site locally (http://127.0.0.1:8001)
    cmds:
      - mkdocs serve -a 0.0.0.0:{{.DOCS_PORT}}

  docs:build:
    desc: Build docs site (strict mode)
    sources:
      - docs/**
      - mkdocs.yml
    generates:
      - site
    cmds:
      - mkdocs build --strict

  docs:up:
    desc: Start docs site in Docker
    cmds:
      - docker compose --profile docs up -d docs

  # ======================== Data ========================
  db:migrate:
    desc: Run Alembic migrations (alembic upgrade head)
    cmds:
      - uv run alembic upgrade head

  # ======================== Deploy / monitor ========================
  health:
    desc: Check API health endpoint
    cmds:
      - curl -s http://localhost:{{.API_PORT}}/health | python3 -m json.tool

  # ======================== Knowhere (self-hosted stack, KNOWHERE_MODE=api only) ========================
  # api mode: Knowhere document parser runs in docker/knowhere-self-hosted/compose.yaml;
  # eagle-rag reaches it via knowhere-net DNS name knowhere on :5005.
  # parser mode: knowhere:up is a no-op; task up/down/ps/clean do not touch the self-hosted stack.
  #
  # Isolation: top-level dotenv loads root .env POSTGRES_PASSWORD / APP_ENV into the shell.
  # Shell env overrides compose .env / ${VAR:-default}, breaking knowhere defaults (root123 / production).
  # Each knowhere task unsets these so knowhere's own env.defaults / .env take effect.
  knowhere:up:
    desc: Start Knowhere self-hosted stack (api mode only; no-op in parser mode)
    dir: '{{.KNOWHERE_DIR}}'
    deps: [net:ensure]
    cmds:
      - |
        if [ "{{.KNOWHERE_MODE}}" = "parser" ]; then
          echo "KNOWHERE_MODE=parser: skipping knowhere self-hosted stack (using in-process knowhere-parse-sdk)"
        else
          unset POSTGRES_PASSWORD APP_ENV && docker compose up -d
        fi

  knowhere:down:
    desc: Stop Knowhere self-hosted stack
    dir: '{{.KNOWHERE_DIR}}'
    cmds:
      - unset POSTGRES_PASSWORD APP_ENV && docker compose down

  knowhere:restart:
    desc: Restart Knowhere self-hosted stack
    dir: '{{.KNOWHERE_DIR}}'
    cmds:
      - unset POSTGRES_PASSWORD APP_ENV && docker compose restart

  knowhere:logs:
    desc: Tail Knowhere logs
    dir: '{{.KNOWHERE_DIR}}'
    cmds:
      - unset POSTGRES_PASSWORD APP_ENV && docker compose logs -f

  knowhere:ps:
    desc: Show Knowhere service status
    dir: '{{.KNOWHERE_DIR}}'
    cmds:
      - unset POSTGRES_PASSWORD APP_ENV && docker compose ps

  knowhere:health:
    desc: Probe Knowhere (HTTP :5005 in api mode; in-process SDK import in parser mode)
    cmds:
      - |
        if [ "{{.KNOWHERE_MODE}}" = "parser" ]; then
          uv run python -c "from knowhere_parse import KnowhereParser; KnowhereParser(); print('knowhere parser SDK -> OK')"
        else
          curl -s -o /dev/null -w "knowhere -> HTTP %{http_code}\n" --max-time 5 {{.KNOWHERE_BASE_URL}} \
            || echo "knowhere unreachable — confirm {{.KNOWHERE_BASE_URL}} is up (task knowhere:up)"
        fi

  logs:api:
    desc: Tail API logs
    cmds:
      - docker compose logs -f api

  logs:worker:
    desc: Tail worker logs (default worker-router; e.g. task logs:worker SERVICE=worker-knowhere)
    cmds:
      - docker compose logs -f {{.SERVICE | default "worker-router"}}

  # ======================== Top-level shortcuts ========================
  setup:
    desc: Bootstrap project (.env, network, install deps; copies knowhere/.env in api mode only)
    cmds:
      - cp -n .env.example .env || true
      - |
        if [ "{{.KNOWHERE_MODE}}" != "parser" ]; then
          cp -n {{.KNOWHERE_DIR}}/.env.example {{.KNOWHERE_DIR}}/.env || true
        fi
      - docker network create knowhere-net 2>/dev/null || true
      - uv sync
      - cd {{.FRONTEND_DIR}} && bun install
      - |
        if [ "{{.KNOWHERE_MODE}}" = "parser" ]; then
          echo "Created .env and knowhere-net; KNOWHERE_MODE=parser — no knowhere/.env needed; set MINERU_API_KEYS then task up"
        else
          echo "Created .env and knowhere/.env and knowhere-net; set API keys then task up"
        fi

  dev:
    desc: Local dev mode (parallel frontend + backend; or use task up for Docker)
    deps:
      - be:api
      - fe:dev

  default:
    desc: Show help (task --list)
    cmds:
      - task --list
