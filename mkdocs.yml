# Eagle-RAG documentation site (mkdocs Material + mkdocs-static-i18n).
#
# Bilingual layout: docs/en/ + docs/zh/ (folder structure). Shared assets in docs/assets/.
# Nav paths omit locale prefixes; the i18n plugin rewrites per language.
site_name: Eagle-RAG Docs
site_description: Eagle-RAG — multimodal RAG knowledge base for Agents & LLMs / 面向 Agent 与 LLM 的多模态 RAG 知识库
site_url: https://eagle-rag.example.com
docs_dir: docs
strict: true

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle: false

extra_css:
  - assets/styles.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mermaid@11.15.0/dist/mermaid.min.js

plugins:
  - search
  - tags
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 简体中文
          build: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.critic
  - pymdownx.mark

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ontos-AI/knowhere
      name: Knowhere

