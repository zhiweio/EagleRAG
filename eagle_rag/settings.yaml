app:
  name: Eagle-RAG
  env: ${APP_ENV:-dev}
  host: ${APP_HOST:-0.0.0.0}
  port: ${APP_PORT:-8000}

# Knowledge-base identifier: a single instance can host multiple KBs; kb_name isolates collections and object-storage prefixes.
kb_name: ${KB_NAME:-default}

milvus:
  host: ${MILVUS_HOST:-localhost}
  port: ${MILVUS_PORT:-19530}
  db_name: ${MILVUS_DB_NAME:-default}
  text_collection: eagle_text
  visual_collection: eagle_visual
  dim_text: 1536
  dim_visual: 2048  # Qwen3-VL-Embedding-2B outputs 2048-dim
  visual_index_type: ${MILVUS_VISUAL_INDEX_TYPE:-hnsw}   # hnsw | diskann
  auto_create_db: true

# Knowhere parsing: mode=api (knowhere-python-sdk → self-hosted :5005) or mode=parser (knowhere-parse-sdk, in-process).
# API mode: Knowhere is split into a standalone compose (docker/knowhere-self-hosted/); reach via knowhere-net DNS `knowhere`.
# Parser mode: no :5005 service; requires MinerU + LLM (mapped from global llm/vlm or knowhere.parser overrides).
knowhere:
  mode: ${KNOWHERE_MODE:-api}   # api | parser
  base_url: ${KNOWHERE_BASE_URL:-http://localhost:5005}
  api_key: ${KNOWHERE_API_KEY:-}
  timeout: ${KNOWHERE_TIMEOUT:-60}
  upload_timeout: ${KNOWHERE_UPLOAD_TIMEOUT:-600}
  max_retries: ${KNOWHERE_MAX_RETRIES:-5}
  poll_interval: ${KNOWHERE_POLL_INTERVAL:-10}
  poll_timeout: ${KNOWHERE_POLL_TIMEOUT:-1800}
  parsing_params:
    model: ${KNOWHERE_PARSING_MODEL:-advanced}
    ocr_enabled: true        # YAML bool (not an env placeholder, to avoid string injection); set to false to disable.
  parser:
    mineru_api_keys: ${MINERU_API_KEYS:-}
    mineru_url: ${MINERU_URL:-https://mineru.net/api/v4}
    tmp_path: ${KNOWHERE_PARSER_TMP_PATH:-}
    use_llm_nav_summary: true
    llm_mock_enabled: ${LLM_MOCK_ENABLED:-false}

# PixelRAG used as a library (pixelrag_render / pixelrag_embed); serve mode is not launched.
pixelrag:
  chunk_size: 1024
  top_k: 5
  tile_height: 8192        # Per-page tile height (px).
  quality: 85              # Render JPEG quality.
  viewport_width: 875      # Render viewport width.
  backend: ${PIXELRAG_BACKEND:-cdp}   # cdp | playwright
  pdf_dpi: 200             # PDF render DPI.
  embed_device: ${PIXELRAG_EMBED_DEVICE:-auto}   # auto | cuda | mps | cpu (for the local Qwen3-VL encoder).
  embed_instruction: "Represent the user's input."   # Encoding instruction, shared by image and text.

# PDF form probing: detect scanned vs text-based PDFs.
pdf_probe:
  text_page_ratio: 0.2       # Threshold ratio of extractable-text pages; below this is treated as scanned.
  avg_chars_per_page: 50     # Threshold for average characters per page.

vlm:
  provider: dashscope
  model: ${VLM_MODEL:-qwen3.6-flash}
  api_key: ${VLM_API_KEY:-}
  base_url: ${VLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}

llm:
  provider: dashscope
  model: ${LLM_MODEL:-deepseek-v4-pro}   # DeepSeek-V4-Pro
  api_key: ${LLM_API_KEY:-}
  base_url: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}

embedding:
  text:
    provider: dashscope
    model: ${TEXT_EMBEDDING_MODEL:-text-embedding-v4}
    api_key: ${DASHSCOPE_API_KEY:-}
    base_url: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
    dim: 1536
  visual:
    # pixelrag = local HF Qwen3-VL-Embedding; dashscope = Bailian qwen3-vl-embedding
    provider: ${VISUAL_EMBEDDING_PROVIDER:-pixelrag}
    model: ${VISUAL_EMBEDDING_MODEL:-Qwen/Qwen3-VL-Embedding-2B}
    api_key: ${DASHSCOPE_API_KEY:-}
    # Native DashScope API base (not OpenAI-compatible). Empty = SDK default.
    base_url: ${DASHSCOPE_API_BASE:-}
    dim: 2048
    batch_size: ${VISUAL_EMBEDDING_BATCH_SIZE:-5}
    timeout_s: ${VISUAL_EMBEDDING_TIMEOUT_S:-60}
    max_retries: ${VISUAL_EMBEDDING_MAX_RETRIES:-3}

rerank:
  text:
    provider: dashscope
    model: ${RERANK_TEXT_MODEL:-qwen3-rerank}
    api_key: ${DASHSCOPE_API_KEY:-}
  visual:
    provider: pixelrag
    model: ${VISUAL_EMBEDDING_MODEL:-Qwen/Qwen3-VL-Embedding-2B}

router:
  mode: ${ROUTER_MODE:-auto}  # auto | text | visual | hybrid
  # Upper bound on document_ids folded into the advanced scope filter (bounds tag-resolved documents in the Milvus `document_id in [...]` predicate).
  max_scope_documents: ${ROUTER_MAX_SCOPE_DOCUMENTS:-500}
  # Max chars of chunk body echoed back on each retrieval source (bounds /search and /query payloads).
  source_content_max_chars: ${ROUTER_SOURCE_CONTENT_MAX_CHARS:-4000}
  # Upper bound on section nodes persisted / served for a document's semantic tree.
  structure_max_nodes: ${ROUTER_STRUCTURE_MAX_NODES:-2000}
  # Two-stage parent-document retrieval on eagle_text (G5).
  parent_doc_retrieval: ${ROUTER_PARENT_DOC_RETRIEVAL:-true}
  # RRF fusion constant for multi-collection merge (G8).
  rrf_k: ${ROUTER_RRF_K:-60}
  llm:
    enabled: ${ROUTER_LLM_ENABLED:-true}   # When false, skip LLM intent classification and go straight to heuristics.
    prompt_template: |-
      判断以下查询应使用哪种检索方式，只回复一个单词：text、visual 或 hybrid。
      - text：政策/法规/条例等纯文本问题
      - visual：报表/表格/图表/截图/看图读数/工商招投标等需要图片的问题
      - hybrid：同时需要文本与图片

      查询：{query}
      回答：
  heuristic:
    rules:
      - keywords: [架构图, 结构图, 示意图, 流程图, 展示图, 原理图, 插图, 图片, diagram, figure, architecture]
        route: hybrid
      - keywords: [表格, 报表, 图表, 截图, 利润, 资产负债, 收入, 成本, 看图, 读数, table, chart, report]
        route: visual
      - keywords: [政策, 法规, 条例, 规定, 第几条, 依据, policy, law, regulation]
        route: text
      - keywords: [工商, 招投标, 中标, 企业信息, business, bid, tender]
        route: visual
    default: text

celery:
  broker_url: ${CELERY_BROKER_URL:-redis://localhost:6379/0}
  result_backend: ${CELERY_RESULT_BACKEND:-redis://localhost:6379/1}
  task_routes:
    eagle_rag.tasks.ingest_router: router_queue
    eagle_rag.tasks.knowhere_parse: knowhere_queue
    eagle_rag.tasks.pixelrag_build: pixelrag_queue
  queues:
    router_queue:
      concurrency: 4
    knowhere_queue:
      concurrency: 8
    pixelrag_queue:
      concurrency: 1        # Strict low concurrency to avoid OOM.
  max_retries: 3
  retry_backoff: 60         # Seconds.

minio:
  endpoint: ${MINIO_ENDPOINT:-localhost:9000}
  access_key: ${MINIO_ACCESS_KEY:-minioadmin}
  secret_key: ${MINIO_SECRET_KEY:-minioadmin}
  secure: false
  bucket: ${MINIO_BUCKET:-eagle-rag}

postgres:
  dsn: ${POSTGRES_DSN:-postgresql://eagle:eagle@localhost:5432/eagle_rag}

storage:
  data_dir: ${STORAGE_DATA_DIR:-./data}
  image_store: ${IMAGE_STORE:-./data/images}

kb:
  text_entity_limit: ${KB_TEXT_ENTITY_LIMIT:-500000}
  visual_entity_limit: ${KB_VISUAL_ENTITY_LIMIT:-200000}

attachments:
  ttl_hours: ${ATTACHMENTS_TTL_HOURS:-24}
  max_image_bytes: ${ATTACHMENTS_MAX_IMAGE_BYTES:-5242880}
  allowed_image_exts: [.png, .jpg, .jpeg, .webp, .gif, .bmp, .tiff, .tif]
  max_count: ${ATTACHMENTS_MAX_COUNT:-1}
  image_only_query: "请根据上传的图片，结合知识库相关内容回答。"
  visual_merge_fetch_multiplier: ${ATTACHMENTS_VISUAL_MERGE_FETCH_MULTIPLIER:-2}
  parse:
    max_bytes: ${ATTACHMENTS_PARSE_MAX_BYTES:-5242880}
    max_chunks: ${ATTACHMENTS_PARSE_MAX_CHUNKS:-50}
    timeout_sec: ${ATTACHMENTS_PARSE_TIMEOUT_SEC:-120}
    cache_enabled: ${ATTACHMENTS_PARSE_CACHE_ENABLED:-true}
    chunk_size: ${ATTACHMENTS_PARSE_CHUNK_SIZE:-2000}

# Ingest routing config: extension / prefix / content_type rules.
# source_type is free-form metadata only (does not affect routing). Core ships empty
# keyword rules — industry labels belong in deployment profiles / domain plugins.
ingest:
  routing:
    prefix_force:                     # Filename prefix → forced pipeline.
      "knowhere:": knowhere
      "pixelrag:": pixelrag
    knowhere_exts: [.docx, .doc, .md, .markdown, .txt, .xlsx, .xls, .csv, .pptx, .json]
    pixelrag_exts: [.png, .jpg, .jpeg, .webp, .gif, .bmp, .tiff, .tif, .htm, .html]
    pdf_exts: [.pdf]
    content_type_rules:               # content_type fallback (no extension / unknown extension).
      - {match: "text/", mode: startswith, pipeline: knowhere}
      - {match: markdown, mode: contains, pipeline: knowhere}
      - {match: msword, mode: contains, pipeline: knowhere}
      - {match: wordprocessing, mode: contains, pipeline: knowhere}
      - {match: "image/", mode: startswith, pipeline: pixelrag}
      - {match: spreadsheet, mode: contains, pipeline: pixelrag}
      - {match: excel, mode: contains, pipeline: pixelrag}
    default_pipeline: knowhere        # Fallback for unknown sources.
  source_type:
    rules: []                         # Empty in Core; set per deployment / profile if needed.
    default: other
  url_prefetch:
    dns_timeout_sec: ${INGEST_URL_DNS_TIMEOUT:-3}
    timeout_sec: ${INGEST_URL_PREFETCH_TIMEOUT:-5}
    max_redirects: ${INGEST_URL_PREFETCH_MAX_REDIRECTS:-3}
    pdf_download_timeout_sec: ${INGEST_URL_PDF_DOWNLOAD_TIMEOUT:-30}
    verify_ssl: ${INGEST_URL_VERIFY_SSL:-true}
    ssl_verify_fallback: ${INGEST_URL_SSL_VERIFY_FALLBACK:-true}
  # Early reject before MinIO/Celery/MinerU (MinerU Precision Extract: 200 MiB / 200 pages).
  limits:
    enabled: ${INGEST_LIMITS_ENABLED:-true}
    max_file_bytes: ${INGEST_MAX_FILE_BYTES:-209715200}
    max_pdf_pages: ${INGEST_MAX_PDF_PAGES:-200}

auth:
  enabled: ${AUTH_ENABLED:-false}
  api_key: ${AUTH_API_KEY:-}

# MCP cloud HTTP deployment config (fastmcp streamable HTTP, stateless + JSON-only).
# When redis_url is empty, the runtime falls back to celery.broker_url.
mcp:
  transport: ${MCP_TRANSPORT:-http}              # stdio | http (fastmcp streamable HTTP).
  streamable_http_path: ${MCP_HTTP_PATH:-/mcp}
  stateless_http: true                            # Mapped to FASTMCP_STATELESS_HTTP=true at startup.
  json_response: true
  standalone: ${MCP_STANDALONE:-false}            # true = standalone uvicorn process.
  host: ${MCP_HOST:-0.0.0.0}
  port: ${MCP_PORT:-8081}
  workers: ${MCP_WORKERS:-4}
  tool_timeout: 30
  max_retries: 3
  circuit_fail_threshold: 5
  cache_ttl: 300
  event_store_enabled: false
  redis_url: ${MCP_REDIS_URL:-}                   # Empty falls back to celery.broker_url.
  auth_provider: ${MCP_AUTH_PROVIDER:-static-token}  # static-token | oauth-github | oauth-custom
  oauth:
    enabled: false
    issuer_url: ""
    client_id: ""
    client_secret: ""
    required_scopes: []
  mtls:
    enabled: false

# In-process plugin microkernel (M1+). Instance binds a single plugin_namespace via default_namespace.
# Select a profile with EAGLE_RAG_PROFILE=core|biomed|lakehouse-bi (see profiles: below).
plugins:
  enabled:
    - eagle_rag.plugins.core_defaults
  default_namespace: ${PLUGIN_NAMESPACE:-core}
  allow_namespace_override: false
  query_assemble_enabled: true
  # Per-plugin knobs keyed by namespace (not Core-typed fields).
  options:
    biomed:
      default_dual_text_search: false
      exploratory_search_collections: []
      encoder_mode: ${EAGLE_BIOMED_ENCODER_MODE:-auto}

# Optional deployment profiles (P2-4): bind namespace + Milvus DB + enabled plugins together.
# Activate via EAGLE_RAG_PROFILE or YAML active_profile.
# active_profile: core
profiles:
  core:
    plugins:
      enabled: [eagle_rag.plugins.core_defaults]
      default_namespace: core
    milvus:
      db_name: default
  biomed:
    plugins:
      enabled: [eagle_rag.plugins.core_defaults, plugins.biomed]
      default_namespace: biomed
      options:
        biomed:
          default_dual_text_search: true
          encoder_mode: ${EAGLE_BIOMED_ENCODER_MODE:-auto}
    milvus:
      db_name: biomed
  lakehouse-bi:
    plugins:
      enabled: [eagle_rag.plugins.core_defaults, plugins.lakehouse_bi]
      default_namespace: lakehouse-bi
    milvus:
      db_name: lakehouse_bi

# Telemetry and observability: structlog (AI event JSONL) + loguru (ops logs) + OpenTelemetry tracing.
telemetry:
  enabled: ${TELEMETRY_ENABLED:-true}
  service_name: ${OTEL_SERVICE_NAME:-eagle-rag}
  environment: ${APP_ENV:-dev}
  ai_log_file: ${AI_TELEMETRY_LOG_FILE:-logs/ai_telemetry.jsonl}
  ai_log_level: ${AI_TELEMETRY_LOG_LEVEL:-INFO}
  ai_log_max_bytes: 10485760       # 10 MB
  ai_log_backup_count: 10
  prompt_truncate: 512
  completion_truncate: 1024
  op_log_file: ${OP_LOG_FILE:-logs/eagle_rag.log}
  op_log_level: ${OP_LOG_LEVEL:-INFO}
  op_log_rotation: "10 MB"
  op_log_retention: "30 days"
  tracing_enabled: ${OTEL_TRACING_ENABLED:-false}
  otlp_endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  otlp_insecure: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
  redis_log_channel: ${REDIS_LOG_CHANNEL:-logs}
  # PluginAudit: AI JSONL (durable) + Redis recent window + memory fallback + Prometheus.
  plugin_audit_enabled: ${PLUGIN_AUDIT_ENABLED:-true}
  plugin_audit_ring_cap: 1000
  plugin_audit_redis_enabled: ${PLUGIN_AUDIT_REDIS_ENABLED:-true}
  plugin_audit_health_limit: 50
