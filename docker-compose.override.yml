# Eagle-RAG dev profile 覆盖（docker compose 在未显式指定 -f 时自动合并本文件）。
# 仅用于本地开发：源码热重载、暴露基础设施端口、放宽资源限制。
#
# ⚠️ prod 部署必须排除本文件，否则 dev 挂载与 --reload 会泄漏到生产：
#    COMPOSE_FILE=docker-compose.yml docker compose --profile prod up -d
# （COMPOSE_FILE 环境变量锁定 compose 文件清单，阻止 override 自动合并。）

services:
  api:
    # 热重载：监听 eagle_rag + plugins；勿监视 ./data（HF 缓存写入会触发 reload）。
    command:
      [
        "uvicorn",
        "eagle_rag.api.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "eagle_rag",
        "--reload-dir",
        "plugins",
      ]
    environment:
      # Deployment profile: core | biomed | lakehouse-bi (see settings.yaml profiles)
      EAGLE_RAG_PROFILE: ${EAGLE_RAG_PROFILE:-core}
      EAGLE_BIOMED_ENCODER_MODE: ${EAGLE_BIOMED_ENCODER_MODE:-deterministic}
      EAGLE_BIOMED_ALLOW_DETERMINISTIC: ${EAGLE_BIOMED_ALLOW_DETERMINISTIC:-1}
    volumes:
      - ./eagle_rag:/app/eagle_rag:ro
      - ./plugins:/app/plugins:ro

  # Worker dev：仅挂载源码便于查看版本一致性，不再做热重载。
  # 改动 celery/任务代码后请用 `docker compose restart worker-*` 手动重启。
  worker-router:
    environment:
      EAGLE_RAG_PROFILE: ${EAGLE_RAG_PROFILE:-core}
      EAGLE_BIOMED_ENCODER_MODE: ${EAGLE_BIOMED_ENCODER_MODE:-deterministic}
      EAGLE_BIOMED_ALLOW_DETERMINISTIC: ${EAGLE_BIOMED_ALLOW_DETERMINISTIC:-1}
    volumes:
      - ./eagle_rag:/app/eagle_rag:ro
      - ./plugins:/app/plugins:ro

  worker-knowhere:
    environment:
      EAGLE_RAG_PROFILE: ${EAGLE_RAG_PROFILE:-core}
      EAGLE_BIOMED_ENCODER_MODE: ${EAGLE_BIOMED_ENCODER_MODE:-deterministic}
      EAGLE_BIOMED_ALLOW_DETERMINISTIC: ${EAGLE_BIOMED_ALLOW_DETERMINISTIC:-1}
    volumes:
      - ./eagle_rag:/app/eagle_rag:ro
      - ./plugins:/app/plugins:ro
    deploy: !reset null

  worker-pixelrag:
    environment:
      EAGLE_RAG_PROFILE: ${EAGLE_RAG_PROFILE:-core}
      EAGLE_BIOMED_ENCODER_MODE: ${EAGLE_BIOMED_ENCODER_MODE:-deterministic}
      EAGLE_BIOMED_ALLOW_DETERMINISTIC: ${EAGLE_BIOMED_ALLOW_DETERMINISTIC:-1}
    volumes:
      - ./eagle_rag:/app/eagle_rag:ro
      - ./plugins:/app/plugins:ro
    deploy: !reset null

  frontend:
    # dev 模式：直接用 Bun 镜像跑 next dev，跳过多阶段构建。
    image: oven/bun:1.2.18
    build: !reset null
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # 每次启动检测 bun.lock / 关键依赖；匿名 node_modules 卷过期时自动 bun install。
    command: ["sh", "./scripts/docker-dev.sh"]

  # 暴露基础设施端口供宿主调试。
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  milvus:
    ports:
      - "19530:19530"
      - "9091:9091"

  # Knowhere 已拆分为独立 compose（docker/knowhere-self-hosted/），
  # 其端口暴露在该 compose 中配置，不再由 eagle-rag override 管理。
