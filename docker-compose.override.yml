# Eagle-RAG dev-profile override (auto-merged by docker compose when -f is not set).
# Local development only: source hot-reload, exposed infra ports, relaxed resource limits.
#
# WARNING: Production deploys must exclude this file or dev mounts / --reload leak into prod:
#    COMPOSE_FILE=docker-compose.yml docker compose --profile prod up -d
# (COMPOSE_FILE locks the Compose file list and blocks automatic override merge.)

services:
  api:
    # Hot-reload: watch eagle_rag + plugins; do not watch ./data (HF cache writes trigger reload).
    # ./logs is mounted in the base Compose file (PluginAudit AI JSONL); host can jq the file.
    command:
      [
        "uvicorn",
        "eagle_rag.api.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "eagle_rag",
        "--reload-dir",
        "plugins",
      ]
    environment:
      # Deployment profile: core | biomed | lakehouse-bi (see settings.yaml profiles)
      EAGLE_RAG_PROFILE: ${EAGLE_RAG_PROFILE:-core}
      EAGLE_BIOMED_ENCODER_MODE: ${EAGLE_BIOMED_ENCODER_MODE:-deterministic}
      EAGLE_BIOMED_ALLOW_DETERMINISTIC: ${EAGLE_BIOMED_ALLOW_DETERMINISTIC:-1}
      # PluginAudit: keep Redis recent window on in local multi-container (api + workers).
      PLUGIN_AUDIT_ENABLED: ${PLUGIN_AUDIT_ENABLED:-true}
      PLUGIN_AUDIT_REDIS_ENABLED: ${PLUGIN_AUDIT_REDIS_ENABLED:-true}
    volumes:
      - ./eagle_rag:/app/eagle_rag:ro
      - ./plugins:/app/plugins:ro

  # Worker dev: mount source for version parity only (no hot-reload).
  # After Celery/task code changes, restart with `docker compose restart worker-*`.
  worker-router:
    environment:
      EAGLE_RAG_PROFILE: ${EAGLE_RAG_PROFILE:-core}
      EAGLE_BIOMED_ENCODER_MODE: ${EAGLE_BIOMED_ENCODER_MODE:-deterministic}
      EAGLE_BIOMED_ALLOW_DETERMINISTIC: ${EAGLE_BIOMED_ALLOW_DETERMINISTIC:-1}
      PLUGIN_AUDIT_ENABLED: ${PLUGIN_AUDIT_ENABLED:-true}
      PLUGIN_AUDIT_REDIS_ENABLED: ${PLUGIN_AUDIT_REDIS_ENABLED:-true}
    volumes:
      - ./eagle_rag:/app/eagle_rag:ro
      - ./plugins:/app/plugins:ro

  worker-knowhere:
    environment:
      EAGLE_RAG_PROFILE: ${EAGLE_RAG_PROFILE:-core}
      EAGLE_BIOMED_ENCODER_MODE: ${EAGLE_BIOMED_ENCODER_MODE:-deterministic}
      EAGLE_BIOMED_ALLOW_DETERMINISTIC: ${EAGLE_BIOMED_ALLOW_DETERMINISTIC:-1}
      PLUGIN_AUDIT_ENABLED: ${PLUGIN_AUDIT_ENABLED:-true}
      PLUGIN_AUDIT_REDIS_ENABLED: ${PLUGIN_AUDIT_REDIS_ENABLED:-true}
    volumes:
      - ./eagle_rag:/app/eagle_rag:ro
      - ./plugins:/app/plugins:ro
    deploy: !reset null

  worker-pixelrag:
    environment:
      EAGLE_RAG_PROFILE: ${EAGLE_RAG_PROFILE:-core}
      EAGLE_BIOMED_ENCODER_MODE: ${EAGLE_BIOMED_ENCODER_MODE:-deterministic}
      EAGLE_BIOMED_ALLOW_DETERMINISTIC: ${EAGLE_BIOMED_ALLOW_DETERMINISTIC:-1}
      PLUGIN_AUDIT_ENABLED: ${PLUGIN_AUDIT_ENABLED:-true}
      PLUGIN_AUDIT_REDIS_ENABLED: ${PLUGIN_AUDIT_REDIS_ENABLED:-true}
    volumes:
      - ./eagle_rag:/app/eagle_rag:ro
      - ./plugins:/app/plugins:ro
    deploy: !reset null

  frontend:
    # Dev mode: run next dev on the Bun image; skip the multi-stage production build.
    image: oven/bun:1.2.18
    build: !reset null
    working_dir: /app
    environment:
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      # Required at next-dev runtime so client bundles see a non-empty public API URL.
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # On each start, check bun.lock / package deps; re-run bun install if the anonymous volume is stale.
    command: ["sh", "./scripts/docker-dev.sh"]

  # Expose infrastructure ports for host-side debugging.
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  milvus:
    ports:
      - "19530:19530"
      - "9091:9091"

  # Knowhere is a separate Compose stack (docker/knowhere-self-hosted/);
  # its host port bindings are configured there, not in this override.
